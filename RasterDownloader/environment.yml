name: raster
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # Core geospatial stack
  - geopandas=0.14.3
  - shapely=2.0.3
  - pyproj=3.6.1
  - rasterio=1.3.9
  - fiona=1.9.5
  - gdal=3.7.3

  # Web server
  - flask=3.0.2
  - werkzeug=3.0.1

  # HTTP
  - requests=2.31.0

  # Useful dependencies used by geopandas stack
  - pandas=2.2.1
  - numpy=1.26.4

  # Optional but often required by rasterio/geopandas workflows
  - libspatialindex
  - rtree
