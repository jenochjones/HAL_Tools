name: hmstossa
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.10

  # Flask backend
  - flask=2.3

  # Data processing
  - pandas=2.1
  - numpy=1.26

  # Geospatial stack (stable + compatible)
  - geopandas=0.14
  - shapely=2.0
  - fiona=1.9
  - pyproj=3.6
  - gdal=3.7

  # Utilities
  - requests
  - ipython

  # Pip
  - pip

  # Install hecdss via pip
  - pip:
      - hecdss